# Proxmox VE VM Configuration: Mac OS X 10.4 Tiger
# Anchor VM: Oldest supported version
#
# Prerequisites:
#   - OpenCore ISO (see https://github.com/LongQT-sea/OpenCore-ISO)
#   - Tiger Intel install DVD ISO
#   - ISA serial for guest agent: agent: enabled=1,type=isa
#
# Notes:
#   - SATA disk required (no VirtIO block support on Tiger)
#   - e1000 network required (no VirtIO net support on Tiger)
#   - Nehalem CPU recommended for Intel Tiger
#   - i386 agent binary required (make build-i386)
#   - Apply 10.4.11 combo update after install for kext v1.9

agent: enabled=1,type=isa
balloon: 0
bios: ovmf
boot: order=ide2;sata0
cores: 2
cpu: Nehalem
efidisk0: local-lvm:vm-VMID-disk-0,efitype=4m,pre-enrolled-keys=0,size=4M
ide2: local:iso/tiger-install.iso,media=cdrom
machine: q35
memory: 4096
name: macos-tiger-10.4
net0: e1000=XX:XX:XX:XX:XX:XX,bridge=vmbr0
numa: 0
ostype: other
sata0: local-lvm:vm-VMID-disk-1,size=32G
scsihw: virtio-scsi-single
smbios1: uuid=XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
sockets: 1
vga: vmware
