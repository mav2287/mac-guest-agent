# Proxmox VE VM Configuration: macOS 11 Big Sur
# Anchor VM: VirtIO + modern stack — validates both transports
#
# Prerequisites:
#   - OpenCore ISO (see https://github.com/LongQT-sea/OpenCore-ISO)
#   - Big Sur installer ISO (use scripts/create-install-iso.sh)
#   - Test with BOTH agent types:
#     agent: enabled=1,type=isa   (ISA serial, primary)
#     agent: enabled=1             (VirtIO serial, secondary test)
#
# Notes:
#   - VirtIO disk and network supported (first version with native VirtIO)
#   - Can test both ISA serial and VirtIO serial transports
#   - APFS with tmutil snapshot freeze path
#   - x86_64 agent binary (make build-x86_64)

agent: enabled=1,type=isa
balloon: 0
bios: ovmf
boot: order=ide2;virtio0
cores: 4
cpu: Nehalem
efidisk0: local-lvm:vm-VMID-disk-0,efitype=4m,pre-enrolled-keys=0,size=4M
ide2: local:iso/big-sur-install.iso,media=cdrom
machine: q35
memory: 8192
name: macos-big-sur-11
net0: virtio=XX:XX:XX:XX:XX:XX,bridge=vmbr0
numa: 0
ostype: other
virtio0: local-lvm:vm-VMID-disk-1,cache=writeback,discard=on,size=64G,ssd=1
scsihw: virtio-scsi-single
smbios1: uuid=XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
sockets: 1
vga: vmware
