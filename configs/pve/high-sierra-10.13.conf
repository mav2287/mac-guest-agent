# Proxmox VE VM Configuration: macOS 10.13 High Sierra
# Anchor VM: APFS transition — validates freeze snapshot path
#
# Prerequisites:
#   - OpenCore ISO (see https://github.com/LongQT-sea/OpenCore-ISO)
#   - High Sierra installer ISO (use scripts/create-install-iso.sh)
#   - ISA serial for guest agent: agent: enabled=1,type=isa
#
# Notes:
#   - SATA disk required (no VirtIO block support pre-10.15)
#   - e1000 network required
#   - First APFS version — validates tmutil localsnapshot freeze path
#   - x86_64 agent binary (make build-x86_64)

agent: enabled=1,type=isa
balloon: 0
bios: ovmf
boot: order=ide2;sata0
cores: 2
cpu: Nehalem
efidisk0: local-lvm:vm-VMID-disk-0,efitype=4m,pre-enrolled-keys=0,size=4M
ide2: local:iso/high-sierra-install.iso,media=cdrom
machine: q35
memory: 4096
name: macos-high-sierra-10.13
net0: e1000=XX:XX:XX:XX:XX:XX,bridge=vmbr0
numa: 0
ostype: other
sata0: local-lvm:vm-VMID-disk-1,discard=on,size=40G,ssd=1
scsihw: virtio-scsi-single
smbios1: uuid=XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
sockets: 1
vga: vmware
