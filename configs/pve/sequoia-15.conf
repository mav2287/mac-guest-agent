# Proxmox VE VM Configuration: macOS 15 Sequoia
# Anchor VM: Current stable release — validates nothing has regressed
#
# Prerequisites:
#   - OpenCore ISO (see https://github.com/LongQT-sea/OpenCore-ISO)
#   - Sequoia installer ISO (use scripts/create-install-iso.sh)
#   - Agent MUST use type=isa (Apple's built-in VirtIO agent claims default channel)
#
# Notes:
#   - VirtIO disk and network supported
#   - Modern security policies (SIP, notarization) — verify no interference
#   - APFS with tmutil snapshot freeze path
#   - x86_64 agent binary for Intel PVE host (make build-x86_64)

agent: enabled=1,type=isa
balloon: 0
bios: ovmf
boot: order=ide2;virtio0
cores: 4
cpu: Nehalem
efidisk0: local-lvm:vm-VMID-disk-0,efitype=4m,pre-enrolled-keys=0,size=4M
ide2: local:iso/sequoia-install.iso,media=cdrom
machine: q35
memory: 8192
name: macos-sequoia-15
net0: virtio=XX:XX:XX:XX:XX:XX,bridge=vmbr0
numa: 0
ostype: other
virtio0: local-lvm:vm-VMID-disk-1,cache=writeback,discard=on,size=64G,ssd=1
scsihw: virtio-scsi-single
smbios1: uuid=XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
sockets: 1
vga: vmware
