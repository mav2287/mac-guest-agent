# macOS QEMU Guest Agent Configuration
# Compatible with Linux /etc/qemu/qemu-ga.conf format
#
# Install to: /etc/qemu/qemu-ga.conf

[general]
# Run as daemon (0 or 1)
daemonize = 0

# Device path (leave empty for auto-detection)
# Auto-detects: /dev/cu.serial1 (ISA), /dev/cu.org.qemu.guest_agent.0 (VirtIO)
# path = /dev/cu.serial1

# Log file (when daemonized, defaults to /var/log/mac-guest-agent.log)
# logfile = /var/log/mac-guest-agent.log

# PID file
# pidfile = /var/run/qemu-ga.pid

# Enable debug logging (0 or 1)
verbose = 0

# Comma-separated list of RPCs to disable
# block-rpcs = guest-exec,guest-set-user-password

# Comma-separated list of RPCs to allow (allowlist mode)
# When set, only listed RPCs are enabled; all others are blocked.
# allow-rpcs = guest-ping,guest-info,guest-get-osinfo
