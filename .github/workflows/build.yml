name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build binaries and run static analysis on the latest runner
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Static analysis (clang --analyze)
        run: |
          echo "Running static analyzer on all source files..."
          SRCS=$(ls src/*.c | grep -v third_party)
          FAILED=0
          for f in $SRCS; do
            echo "  Analyzing $f..."
            clang --analyze -Isrc -Isrc/third_party \
              -isysroot $(xcrun --show-sdk-path) \
              -DVERSION=\"test\" $f 2>&1 | tee /tmp/analyze.out
            if grep -q "warning:" /tmp/analyze.out; then
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "Static analysis found issues"
            exit 1
          fi
          echo "Static analysis clean"

      - name: Build all architectures
        run: make build-all

      - name: Download legacy SDK and build i386
        run: |
          curl -L -o /tmp/sdk.tar.xz https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX10.13.sdk.tar.xz
          tar xf /tmp/sdk.tar.xz -C /tmp
          make build-i386 I386_SDK=/tmp/MacOSX10.13.sdk

      - name: Check binaries
        run: |
          echo "=== i386 ==="
          file build/mac-guest-agent-i386
          echo "Size: $(du -h build/mac-guest-agent-i386 | cut -f1)"
          echo ""
          echo "=== x86_64 ==="
          file build/mac-guest-agent-x86_64
          otool -l build/mac-guest-agent-x86_64 | grep -A 3 "LC_VERSION_MIN"
          echo "Size: $(du -h build/mac-guest-agent-x86_64 | cut -f1)"
          echo ""
          echo "=== arm64 ==="
          file build/mac-guest-agent-arm64
          otool -l build/mac-guest-agent-arm64 | grep -A 3 "LC_BUILD_VERSION"
          echo "Size: $(du -h build/mac-guest-agent-arm64 | cut -f1)"
          echo ""
          echo "=== universal ==="
          file build/mac-guest-agent-universal
          echo "Size: $(du -h build/mac-guest-agent-universal | cut -f1)"

      - name: Verify no clock_gettime (breaks pre-10.12)
        run: |
          for bin in build/mac-guest-agent-x86_64 build/mac-guest-agent-arm64; do
            if nm -u "$bin" 2>/dev/null | grep -q clock_gettime; then
              echo "FAIL: $bin contains clock_gettime"
              exit 1
            fi
          done
          echo "OK: No clock_gettime references"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: mac-guest-agent-binaries
          path: |
            build/mac-guest-agent-i386
            build/mac-guest-agent-x86_64
            build/mac-guest-agent-arm64
            build/mac-guest-agent-universal

  # Run the full test suite on multiple macOS versions
  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Self-test
        run: ./build/mac-guest-agent --self-test

      - name: Self-test JSON
        run: |
          ./build/mac-guest-agent --self-test-json 2>/dev/null | python3 -m json.tool > /dev/null
          echo "JSON output valid"

      - name: Unit tests
        run: make test-unit

      - name: Proactive tests
        run: make test-proactive

      - name: Fuzz tests (ASAN, 210k rounds)
        run: make test-fuzz

      - name: Integration tests
        run: ./tests/run_tests.sh ./build/mac-guest-agent

      - name: Code coverage
        run: make test-coverage

  # ASAN build and test (separate job for clarity)
  asan:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with AddressSanitizer
        run: |
          mkdir -p build
          clang -Wall -Wextra -O1 -g -std=c99 -DVERSION=\"test\" \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Isrc -Isrc/third_party \
            -o build/mac-guest-agent-asan \
            src/main.c src/agent.c src/channel.c src/protocol.c src/commands.c \
            src/cmd-info.c src/cmd-system.c src/cmd-power.c src/cmd-hardware.c \
            src/cmd-disk.c src/cmd-fs.c src/cmd-network.c src/cmd-file.c \
            src/cmd-exec.c src/cmd-ssh.c src/cmd-user.c \
            src/util.c src/log.c src/compat.c src/service.c src/selftest.c \
            src/third_party/cJSON.c \
            -framework CoreFoundation -framework IOKit

      - name: ASAN smoke tests
        run: |
          CMDS=(
            '{"execute":"guest-ping"}'
            '{"execute":"guest-info"}'
            '{"execute":"guest-get-osinfo"}'
            '{"execute":"guest-get-host-name"}'
            '{"execute":"guest-get-timezone"}'
            '{"execute":"guest-get-time"}'
            '{"execute":"guest-get-users"}'
            '{"execute":"guest-get-load"}'
            '{"execute":"guest-get-vcpus"}'
            '{"execute":"guest-get-memory-blocks"}'
            '{"execute":"guest-get-memory-block-info"}'
            '{"execute":"guest-get-cpustats"}'
            '{"execute":"guest-network-get-interfaces"}'
            '{"execute":"guest-network-get-route"}'
            '{"execute":"guest-fsfreeze-status"}'
          )
          for cmd in "${CMDS[@]}"; do
            echo "$cmd" | ./build/mac-guest-agent-asan --test 2>/dev/null | head -1
          done
          echo "ASAN: all commands passed (no leaks/overflows)"

      - name: ASAN integration tests
        run: |
          make build
          ./tests/run_tests.sh ./build/mac-guest-agent-asan || true
          echo "ASAN integration tests complete"
