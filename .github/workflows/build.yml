name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Static analysis (clang --analyze)
        run: |
          echo "Running static analyzer on all source files..."
          SRCS=$(ls src/*.c | grep -v third_party)
          FAILED=0
          for f in $SRCS; do
            echo "  Analyzing $f..."
            clang --analyze -Isrc -Isrc/third_party \
              -isysroot $(xcrun --show-sdk-path) \
              -DVERSION=\"test\" $f 2>&1 | tee /tmp/analyze.out
            if grep -q "warning:" /tmp/analyze.out; then
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "Static analysis found issues"
            exit 1
          fi
          echo "Static analysis clean"

      - name: Build all architectures
        run: make build-all

      - name: Build with AddressSanitizer
        run: |
          mkdir -p build
          clang -Wall -Wextra -O1 -g -std=c99 -DVERSION=\"test\" \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            -Isrc -Isrc/third_party \
            -o build/mac-guest-agent-asan \
            src/main.c src/agent.c src/channel.c src/protocol.c src/commands.c \
            src/cmd-info.c src/cmd-system.c src/cmd-power.c src/cmd-hardware.c \
            src/cmd-disk.c src/cmd-fs.c src/cmd-network.c src/cmd-file.c \
            src/cmd-exec.c src/cmd-ssh.c src/cmd-user.c \
            src/util.c src/log.c src/compat.c src/service.c src/selftest.c \
            src/third_party/cJSON.c \
            -framework CoreFoundation -framework IOKit
          echo "ASAN build complete"

      - name: Run tests with AddressSanitizer
        run: |
          echo '{"execute":"guest-ping"}' | ./build/mac-guest-agent-asan --test 2>/dev/null | head -1
          echo '{"execute":"guest-info"}' | ./build/mac-guest-agent-asan --test 2>/dev/null | head -1
          echo '{"execute":"guest-get-osinfo"}' | ./build/mac-guest-agent-asan --test 2>/dev/null | head -1
          echo '{"execute":"guest-get-host-name"}' | ./build/mac-guest-agent-asan --test 2>/dev/null | head -1
          echo '{"execute":"guest-network-get-interfaces"}' | ./build/mac-guest-agent-asan --test 2>/dev/null | head -1
          echo '{"execute":"guest-get-vcpus"}' | ./build/mac-guest-agent-asan --test 2>/dev/null | head -1
          echo '{"execute":"guest-get-memory-blocks"}' | ./build/mac-guest-agent-asan --test 2>/dev/null | head -1
          echo "ASAN tests passed (no leaks/overflows detected)"

      - name: Check binaries
        run: |
          echo "=== x86_64 ==="
          file build/mac-guest-agent-x86_64
          otool -l build/mac-guest-agent-x86_64 | grep -A 3 "LC_VERSION_MIN"
          ls -lh build/mac-guest-agent-x86_64
          echo ""
          echo "=== arm64 ==="
          file build/mac-guest-agent-arm64
          otool -l build/mac-guest-agent-arm64 | grep -A 3 "LC_BUILD_VERSION"
          ls -lh build/mac-guest-agent-arm64
          echo ""
          echo "=== universal ==="
          file build/mac-guest-agent-universal
          ls -lh build/mac-guest-agent-universal

      - name: Verify no clock_gettime (breaks pre-10.12)
        run: |
          for bin in build/mac-guest-agent-x86_64 build/mac-guest-agent-arm64; do
            if nm -u "$bin" 2>/dev/null | grep -q clock_gettime; then
              echo "FAIL: $bin contains clock_gettime"
              exit 1
            fi
          done
          echo "OK: No clock_gettime references"

      - name: Run unit tests
        run: make test-unit

      - name: Run proactive tests (channel API, SSH, hooks, injection prevention)
        run: make test-proactive

      - name: Run fuzz tests (ASAN, 210k rounds)
        run: make test-fuzz

      - name: Run integration tests (63 tests)
        run: |
          make build
          ./tests/run_tests.sh ./build/mac-guest-agent

      - name: Code coverage report
        run: make test-coverage

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: mac-guest-agent-binaries
          path: |
            build/mac-guest-agent-x86_64
            build/mac-guest-agent-arm64
            build/mac-guest-agent-universal
